name: Daily Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '0 10 * * *'  # UTC time
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Make changes
        run: |
          echo "Update $(date)" >> log.txt

      - name: Commit & Push
        run: |
          git config --global user.name "YourName"
          git config --global user.email "you@example.com"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
